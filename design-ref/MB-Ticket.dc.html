<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.85;background:#E8E8E3;border:1px solid #141416;padding:30px 32px;color:#141416;box-shadow:6px 6px 0 rgba(126,140,130,.28)">
  <div style="display:flex;justify-content:space-between;font-weight:500;letter-spacing:.06em"><span>BON DE CONVOYAGE</span><span>N° {{ ref }}</span></div>
  <div style="border-top:1px dashed #6E6F6A;margin:14px 0 16px"></div>
  <div style="margin-bottom:6px">Statut&nbsp;: <span style="color:#7E8C82">{{ statut }}</span></div>
  <div style="margin-bottom:6px">Prochaine mise à jour&nbsp;: indéterminée.</div>
  <div style="margin-bottom:6px">Position estimée&nbsp;: entre deux centres de tri.</div>
  <div>Empreinte carbone du trajet&nbsp;: en cours de calcul depuis {{ jours }} jours.</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 560, &quot;height&quot;: 200 },
  &quot;ref&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;MB-4042-77&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;statut&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;votre colis transite par un centre de tri.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;jours&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 412, &quot;tsType&quot;: &quot;number&quot; }
}"></script>
</body>
</html>
